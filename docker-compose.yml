services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build: .
    container_name: orionmenu_api
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Port not exposed externally — Nginx is the only gateway
    expose:
      - "8000"
    networks:
      - internal

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: orionmenu_mongo
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-mongoadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-saas_menu}
    volumes:
      - mongo_data:/data/db
    # Port not exposed externally
    expose:
      - "27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orionmenu_redis
    restart: unless-stopped
    env_file:
      - .env.production
    # Persistence: snapshot every 60s if ≥1 key changed + AOF for durability
    command: >
      redis-server
      --save 60 1
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD}
      --loglevel warning
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: orionmenu_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - api
    networks:
      - internal

  # ── Certbot (SSL auto-renew) ─────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: orionmenu_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Runs on-demand only — checks renewal every 12h
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - internal

volumes:
  mongo_data:
  redis_data:
  uploads_data:
  certbot_www:
  certbot_certs:

networks:
  internal:
    driver: bridge
