# ──────────────────────────────────────────────────────────────────────────────
# OrionMenu — Nginx reverse proxy
# Domain: api.orionsmenu.com
# ──────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.orionsmenu.com;

    # Allow certbot challenge through before redirecting
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server block
server {
    listen 443 ssl;
    http2 on;
    server_name api.orionsmenu.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/api.orionsmenu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.orionsmenu.com/privkey.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Max upload size (match backend 5 MB limit + headroom)
    client_max_body_size 10M;

    # ── Uploaded images — served directly by Nginx (no FastAPI hop) ──────────
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── API proxy → FastAPI container ────────────────────────────────────────
    location / {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future use)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout  60s;
    }
}
